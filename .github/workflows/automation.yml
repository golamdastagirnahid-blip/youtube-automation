name: Video Upload

on:
  repository_dispatch:
    types: [new_video_detected]
  workflow_dispatch:
    inputs:
      video_id:
        description: 'YouTube Video ID'
        required: true
        default: ''
      video_url:
        description: 'YouTube Video URL'
        required: true
        default: ''
      video_title:
        description: 'Video Title'
        required: false
        default: 'Relaxing Video'
      video_privacy:
        description: 'Privacy'
        required: false
        default: 'public'

jobs:
  upload:
    runs-on: self-hosted
    timeout-minutes: 1440
    permissions:
      contents: write

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          clean: true
          fetch-depth: 1
          ref: main

      - name: Install FFmpeg
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          $ffmpegExe = "C:\Python312\ffmpeg.exe"
          if (Test-Path $ffmpegExe) {
            Write-Host "FFmpeg already installed"
          } else {
            Write-Host "Installing FFmpeg..."
            $zipUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
            $zipFile = Join-Path $env:TEMP "ffmpeg.zip"
            $extractDir = Join-Path $env:TEMP "ffmpeg_extract"
            Invoke-WebRequest -Uri $zipUrl -OutFile $zipFile -UseBasicParsing
            if (Test-Path $extractDir) { Remove-Item -Recurse -Force $extractDir }
            Expand-Archive -Path $zipFile -DestinationPath $extractDir -Force
            $binDir = Get-ChildItem -Path $extractDir -Recurse -Directory -Filter "bin" | Select-Object -First 1
            if ($binDir) {
              $dest = "C:\Python312"
              Copy-Item (Join-Path $binDir.FullName "ffmpeg.exe") -Destination $dest -Force
              Copy-Item (Join-Path $binDir.FullName "ffprobe.exe") -Destination $dest -Force
              Write-Host "FFmpeg installed"
            } else {
              Write-Host "ERROR: ffmpeg bin not found"; exit 1
            }
            Remove-Item $zipFile -Force -ErrorAction SilentlyContinue
            Remove-Item -Recurse -Force $extractDir -ErrorAction SilentlyContinue
          }
          if (-not (Test-Path $ffmpegExe)) { Write-Host "ERROR: ffmpeg missing"; exit 1 }
          Write-Host "FFmpeg OK"

      - name: Install Node.js
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          if (Test-Path "C:\nodejs\node.exe") {
            Write-Host "Node.js already installed"
            C:\nodejs\node.exe --version
          } else {
            Write-Host "Installing Node.js..."
            $nodeUrl = "https://nodejs.org/dist/v22.15.0/node-v22.15.0-win-x64.zip"
            $zipFile = Join-Path $env:TEMP "nodejs.zip"
            Invoke-WebRequest -Uri $nodeUrl -OutFile $zipFile -UseBasicParsing
            Expand-Archive -Path $zipFile -DestinationPath $env:TEMP -Force
            $nodeDir = Get-ChildItem -Path $env:TEMP -Directory -Filter "node-v*" | Select-Object -First 1
            if ($nodeDir) {
              if (Test-Path "C:\nodejs") { Remove-Item -Recurse -Force "C:\nodejs" }
              Move-Item $nodeDir.FullName "C:\nodejs" -Force
              Write-Host "Node.js installed"
              C:\nodejs\node.exe --version
            } else {
              Write-Host "ERROR: Node.js extraction failed"; exit 1
            }
            Remove-Item $zipFile -Force -ErrorAction SilentlyContinue
          }
          echo "C:\nodejs" >> $env:GITHUB_PATH

      - name: Install PO Token Server
        shell: powershell
        run: |
          $potDir = "C:\pot-server"
          $buildFile = Join-Path $potDir "server\build\main.js"
          if (Test-Path $buildFile) {
            Write-Host "PO Token server already built"
          } else {
            Write-Host "Setting up PO Token server..."
            if (Test-Path $potDir) { Remove-Item -Recurse -Force $potDir }
            git clone --depth 1 https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git $potDir
            if (-not (Test-Path (Join-Path $potDir "server\package.json"))) {
              Write-Host "ERROR: git clone failed"; exit 1
            }
            Write-Host "Running npm ci..."
            Set-Location (Join-Path $potDir "server")
            C:\nodejs\npm.cmd ci
            if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: npm ci failed"; exit 1 }
            Write-Host "Running tsc..."
            C:\nodejs\npx.cmd tsc
            if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: tsc failed"; exit 1 }
            if (Test-Path $buildFile) {
              Write-Host "PO Token server built successfully"
            } else {
              Write-Host "ERROR: build output not found"; exit 1
            }
          }

      - name: Start PO Token Server
        shell: powershell
        run: |
          $serverScript = "C:\pot-server\server\build\main.js"
          if (-not (Test-Path $serverScript)) {
            Write-Host "ERROR: PO Token server not found"; exit 1
          }
          Write-Host "Starting PO Token server on port 4416..."
          Start-Process -NoNewWindow -FilePath "C:\nodejs\node.exe" -ArgumentList $serverScript
          Start-Sleep -Seconds 5
          try {
            $response = Invoke-WebRequest -Uri "http://127.0.0.1:4416" -UseBasicParsing -TimeoutSec 5 -ErrorAction SilentlyContinue
            Write-Host "PO Token server running (status: $($response.StatusCode))"
          } catch {
            Write-Host "PO Token server started (no health endpoint, but process is running)"
          }

      - name: Install Dependencies
        shell: powershell
        run: |
          Write-Host "Installing yt-dlp..."
          C:\Python312\python.exe -m pip install -U yt-dlp
          Write-Host "Installing bgutil-ytdlp-pot-provider..."
          C:\Python312\python.exe -m pip install -U bgutil-ytdlp-pot-provider
          Write-Host "Installing requirements.txt..."
          C:\Python312\python.exe -m pip install -r requirements.txt
          Write-Host "yt-dlp version:"
          C:\Python312\python.exe -m yt_dlp --version

      - name: Setup Cookies
        shell: powershell
        env:
          COOKIES_DATA: ${{ secrets.COOKIES_TXT }}
        run: |
          if ($env:COOKIES_DATA) {
            [System.IO.File]::WriteAllText(
              (Join-Path $PWD "cookies.txt"),
              $env:COOKIES_DATA
            )
            Write-Host "Cookies: backup loaded (PO tokens are primary auth)"
          } else {
            Write-Host "No cookies (not needed - PO tokens handle auth)"
          }

      - name: Create Credentials
        shell: powershell
        env:
          CLIENT_DATA: ${{ secrets.CLIENT_SECRETS }}
          TOKEN_DATA: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          [System.IO.File]::WriteAllText(
            (Join-Path $PWD "client_secrets.json"),
            $env:CLIENT_DATA
          )
          [System.IO.File]::WriteAllText(
            (Join-Path $PWD "token.json"),
            $env:TOKEN_DATA
          )
          Write-Host "Credentials created"

      - name: Create Database If Missing
        shell: powershell
        run: |
          if (-not (Test-Path "database.json")) {
            [System.IO.File]::WriteAllText(
              (Join-Path $PWD "database.json"),
              '{"uploaded_videos":[],"daily_counts":{},"statistics":{"total_uploads":0},"queued":[]}'
            )
            Write-Host "database.json created"
          } else {
            Write-Host "database.json exists"
          }

      - name: Set Variables
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $VIDEO_ID      = "${{ github.event.inputs.video_id }}"
            $VIDEO_URL     = "${{ github.event.inputs.video_url }}"
            $VIDEO_TITLE   = "${{ github.event.inputs.video_title }}"
            $VIDEO_PRIVACY = "${{ github.event.inputs.video_privacy }}"
          } else {
            $VIDEO_ID      = "${{ github.event.client_payload.video_id }}"
            $VIDEO_URL     = "${{ github.event.client_payload.video_url }}"
            $VIDEO_TITLE   = "${{ github.event.client_payload.video_title }}"
            $VIDEO_PRIVACY = "${{ github.event.client_payload.video_privacy }}"
          }
          if (-not $VIDEO_PRIVACY) { $VIDEO_PRIVACY = "public" }
          if (-not $VIDEO_TITLE)   { $VIDEO_TITLE   = "Relaxing Video" }
          if ($VIDEO_ID -match "^([a-zA-Z0-9_-]+)") {
            $VIDEO_ID = $Matches[1]
          }
          $VIDEO_URL = $VIDEO_URL -replace '[&?]t=[^&]*', ''
          echo "VIDEO_ID=$VIDEO_ID"           >> $env:GITHUB_ENV
          echo "VIDEO_URL=$VIDEO_URL"         >> $env:GITHUB_ENV
          echo "VIDEO_TITLE=$VIDEO_TITLE"     >> $env:GITHUB_ENV
          echo "VIDEO_PRIVACY=$VIDEO_PRIVACY" >> $env:GITHUB_ENV
          Write-Host "Video ID: $VIDEO_ID"
          Write-Host "Video URL: $VIDEO_URL"

      - name: Test Setup
        shell: powershell
        run: |
          $env:PYTHONIOENCODING = "utf-8"
          Write-Host "Testing yt-dlp..."
          C:\Python312\python.exe -c "import yt_dlp; print('yt-dlp', yt_dlp.version.__version__)"
          Write-Host "Testing PO Token plugin (via yt-dlp)..."
          C:\Python312\python.exe -m yt_dlp --version
          Write-Host "FFmpeg: $(Test-Path C:\Python312\ffmpeg.exe)"
          Write-Host "Node.js: $(Test-Path C:\nodejs\node.exe)"
          Write-Host "PO Token server: $(Test-Path C:\pot-server\server\build\main.js)"
          Write-Host "Verifying PO Token plugin is loaded..."
          C:\Python312\python.exe -c "import yt_dlp; ydl = yt_dlp.YoutubeDL({'quiet': True}); print('PO Token providers:', [p for p in dir(ydl._ies) if 'pot' in p.lower()])"

      - name: Run Automation
        shell: powershell
        run: |
          $env:PYTHONIOENCODING = "utf-8"
          C:\Python312\python.exe main.py run
        env:
          VIDEO_ID:           ${{ env.VIDEO_ID }}
          VIDEO_URL:          ${{ env.VIDEO_URL }}
          VIDEO_TITLE:        ${{ env.VIDEO_TITLE }}
          VIDEO_PRIVACY:      ${{ env.VIDEO_PRIVACY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Save Database
        if: always()
        shell: powershell
        run: |
          git config user.name  "automation-bot"
          git config user.email "bot@github.com"
          git add database.json
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update DB [skip ci]"
            git push
            Write-Host "Database saved"
          } else {
            Write-Host "No changes to save"
          }

      - name: Cleanup
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          Get-Process -Name "node" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force downloads -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force processed -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force thumbnails -ErrorAction SilentlyContinue
          Remove-Item -Force token.json -ErrorAction SilentlyContinue
          Remove-Item -Force client_secrets.json -ErrorAction SilentlyContinue
          Remove-Item -Force cookies.txt -ErrorAction SilentlyContinue
          Write-Host "Cleanup done"
