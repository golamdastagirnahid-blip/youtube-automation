name: YouTube Automation

on:
  repository_dispatch:
    types: [new_video_detected]
  workflow_dispatch:
    inputs:
      video_id:
        description: 'YouTube Video ID'
        required: false
        default: ''
      video_url:
        description: 'YouTube Video URL'
        required: false
        default: ''
      video_title:
        description: 'Video Title'
        required: false
        default: 'Test Video'
      video_privacy:
        description: 'Video Privacy (public/private/unlisted)'
        required: false
        default: 'public'

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # ── Step 1: Checkout Code ──────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Step 2: Setup Python ───────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── Step 3: Install FFmpeg ─────────────────────────
      - name: Install FFmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg

      # ── Step 4: Setup Windscribe VPN ───────────────────
      - name: Setup Windscribe VPN
        run: |
          echo "🌐 Installing Windscribe VPN..."

          # Download Windscribe
          wget -q "https://windscribe.com/install/desktop/linux_deb_x64" \
            -O windscribe.deb

          # Install Windscribe
          sudo dpkg -i windscribe.deb 2>/dev/null || true
          sudo apt-get install -f -y 2>/dev/null || true

          # Find windscribe binary location
          echo "🔍 Finding windscribe binary..."
          find / -name "windscribe" -type f 2>/dev/null || true
          ls /usr/bin/winds* 2>/dev/null || true
          ls /usr/local/bin/winds* 2>/dev/null || true
          ls /opt/windscribe* 2>/dev/null || true

          # Add possible paths
          export PATH=$PATH:/usr/bin:/usr/local/bin:/opt/windscribe

          # Start service
          echo "🚀 Starting Windscribe service..."
          sudo systemctl start windscribe-helper 2>/dev/null || true
          sudo systemctl start windscribe 2>/dev/null || true
          sleep 5

          # Check all possible windscribe locations
          WINDSCRIBE_CMD=""
          for cmd in \
            windscribe \
            /usr/bin/windscribe \
            /usr/local/bin/windscribe \
            /opt/windscribe/windscribe \
            /usr/lib/windscribe/windscribe
          do
            if command -v "$cmd" &>/dev/null || [ -f "$cmd" ]; then
              WINDSCRIBE_CMD="$cmd"
              echo "✅ Found windscribe at: $cmd"
              break
            fi
          done

          if [ -z "$WINDSCRIBE_CMD" ]; then
            echo "❌ Windscribe binary not found!"
            echo "📂 Checking installed files..."
            dpkg -L windscribe 2>/dev/null | head -30 || true
          else
            echo "🔐 Logging into Windscribe..."
            "$WINDSCRIBE_CMD" login \
              ${{ secrets.WINDSCRIBE_USERNAME }} \
              ${{ secrets.WINDSCRIBE_PASSWORD }} || true

            sleep 3

            echo "🔌 Connecting to India..."
            "$WINDSCRIBE_CMD" connect India || true

            sleep 20

            echo "✅ VPN Status:"
            "$WINDSCRIBE_CMD" status || true
          fi

          echo ""
          echo "🌍 Current IP and Location:"
          curl -s https://ipapi.co/json/ | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              print(f'  IP      : {d[\"ip\"]}')
              print(f'  Country : {d[\"country_name\"]}')
              print(f'  City    : {d[\"city\"]}')
          except:
              print('  Could not get location info')
          " || true

      # ── Step 5: Install Dependencies ──────────────────
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -U yt-dlp

      # ── Step 6: Restore Database ───────────────────────
      - name: Restore Database
        uses: actions/cache@v4
        with:
          path: database.json
          key: db-v1
          restore-keys: db-v1

      # ── Step 7: Create Credentials ────────────────────
      - name: Create Credentials
        run: |
          echo '${{ secrets.CLIENT_SECRETS }}' > client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN }}'  > token.json
          printf '%s' '${{ secrets.COOKIES_TXT }}' > cookies.txt

      # ── Step 8: Verify Files ───────────────────────────
      - name: Verify Files
        run: |
          echo "📁 Checking credential files..."
          if [ -f "cookies.txt" ]; then
            SIZE=$(wc -c < cookies.txt)
            echo "✅ cookies.txt found ($SIZE bytes)"
          else
            echo "❌ cookies.txt NOT found!"
          fi
          if [ -f "client_secrets.json" ]; then
            echo "✅ client_secrets.json found"
          else
            echo "❌ client_secrets.json NOT found!"
          fi
          if [ -f "token.json" ]; then
            echo "✅ token.json found"
          else
            echo "❌ token.json NOT found!"
          fi

      # ── Step 9: Set Video Variables ───────────────────
      - name: Set Video Variables
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VIDEO_ID=${{ github.event.inputs.video_id }}"           >> $GITHUB_ENV
            echo "VIDEO_URL=${{ github.event.inputs.video_url }}"         >> $GITHUB_ENV
            echo "VIDEO_TITLE=${{ github.event.inputs.video_title }}"     >> $GITHUB_ENV
            echo "VIDEO_PRIVACY=${{ github.event.inputs.video_privacy }}" >> $GITHUB_ENV
          else
            echo "VIDEO_ID=${{ github.event.client_payload.video_id }}"           >> $GITHUB_ENV
            echo "VIDEO_URL=${{ github.event.client_payload.video_url }}"         >> $GITHUB_ENV
            echo "VIDEO_TITLE=${{ github.event.client_payload.video_title }}"     >> $GITHUB_ENV
            echo "VIDEO_PRIVACY=${{ github.event.client_payload.video_price }}"   >> $GITHUB_ENV
          fi

      # ── Step 10: Show Video Info ───────────────────────
      - name: Show Video Info
        run: |
          echo "============================================"
          echo "🎬 Video Information"
          echo "   ID     : ${{ env.VIDEO_ID }}"
          echo "   URL    : ${{ env.VIDEO_URL }}"
          echo "   Title  : ${{ env.VIDEO_TITLE }}"
          echo "   Privacy: ${{ env.VIDEO_PRIVACY }}"
          echo "============================================"

      # ── Step 11: Check yt-dlp Version ─────────────────
      - name: Check yt-dlp Version
        run: |
          echo "📦 yt-dlp version: $(yt-dlp --version)"

      # ── Step 12: Test Video Access ─────────────────────
      - name: Test Video Access
        run: |
          echo "🧪 Testing video access..."
          yt-dlp \
            --extractor-args "youtube:player_client=ios,android" \
            --geo-bypass \
            --cookies cookies.txt \
            --skip-download \
            --print title \
            "${{ env.VIDEO_URL }}" \
            && echo "✅ Video is accessible!" \
            || echo "⚠️ Test failed - will still try in main script"

      # ── Step 13: Run Automation ────────────────────────
      - name: Run Automation
        run: python main.py run
        env:
          VIDEO_PRIVACY: ${{ env.VIDEO_PRIVACY }}

      # ── Step 14: Save Database ─────────────────────────
      - name: Save Database
        if: always()
        run: |
          git config user.name  "automation-bot"
          git config user.email "bot@github.com"
          git add database.json || true
          git diff --staged --quiet || git commit -m "Update DB [skip ci]"
          git push || true
