name: Video Upload

on:
  repository_dispatch:
    types: [new_video_detected]
  workflow_dispatch:
    inputs:
      video_id:
        description: 'YouTube Video ID'
        required: true
      video_url:
        description: 'YouTube Video URL'
        required: true
      video_title:
        description: 'Video Title'
        required: false
        default: 'Relaxing Video'
      video_privacy:
        description: 'Privacy'
        required: false
        default: 'public'

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          clean: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg + Deno
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          echo "✅ FFmpeg ready"
          echo "✅ Deno ready: $(deno --version | head -1)"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -U yt-dlp

      - name: Create Credentials
        run: |
          echo '${{ secrets.CLIENT_SECRETS }}' > client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN }}'  > token.json
          printf '%s' '${{ secrets.COOKIES_TXT }}' > cookies.txt
          echo "✅ Credentials created"
          echo "📄 cookies.txt size: $(wc -c < cookies.txt) bytes"

      - name: Test YouTube Access
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          echo "🧪 Testing with cookies + PO Token + Deno..."
          yt-dlp \
            --cookies cookies.txt \
            --extractor-args "youtube:player_client=web" \
            --extractor-args "youtube:po_token=web+${{ secrets.PO_TOKEN }}" \
            --extractor-args "youtube:visitor_data=${{ secrets.VISITOR_DATA }}" \
            --js-runtimes deno \
            --skip-download \
            --print duration_string \
            "${{ env.VIDEO_URL }}" \
            && echo "✅ SUCCESS with PO Token" \
            || echo "⚠️ PO Token failed"

          echo ""
          echo "🧪 Testing Android client..."
          yt-dlp \
            --cookies cookies.txt \
            --extractor-args "youtube:player_client=android" \
            --skip-download \
            --print duration_string \
            "${{ env.VIDEO_URL }}" \
            && echo "✅ Android SUCCESS" \
            || echo "⚠️ Android failed"

      - name: Run Automation
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          python main.py run
        env:
          VIDEO_ID:           ${{ env.VIDEO_ID }}
          VIDEO_URL:          ${{ env.VIDEO_URL }}
          VIDEO_TITLE:        ${{ env.VIDEO_TITLE }}
          VIDEO_PRIVACY:      ${{ env.VIDEO_PRIVACY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PO_TOKEN:           ${{ secrets.PO_TOKEN }}
          VISITOR_DATA:       ${{ secrets.VISITOR_DATA }}

      - name: Save Database
        if: always()
        run: |
          git config user.name  "automation-bot"
          git config user.email "bot@github.com"
          git add database.json || true
          git diff --staged --quiet || git commit -m "Update DB [skip ci]"
          git push || true

      - name: Cleanup
        if: always()
        run: |
          rm -rf downloads/ processed/ thumbnails/ || true
          rm -f cookies.txt token.json client_secrets.json || true
          echo "✅ Cleanup done"
