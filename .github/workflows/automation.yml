name: YouTube Automation

on:
  repository_dispatch:
    types: [new_video_detected]
  workflow_dispatch:
    inputs:
      video_id:
        description: 'YouTube Video ID'
        required: false
        default: ''
      video_url:
        description: 'YouTube Video URL'
        required: false
        default: ''
      video_title:
        description: 'Video Title'
        required: false
        default: 'Test Video'

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Restore Database
        uses: actions/cache@v4
        with:
          path: database.json
          key: db-v1
          restore-keys: db-v1

      - name: Create Credentials
        run: |
          echo '${{ secrets.CLIENT_SECRETS }}' > client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN }}'  > token.json

      - name: Set Video Variables
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VIDEO_ID=${{ github.event.inputs.video_id }}"       >> $GITHUB_ENV
            echo "VIDEO_URL=${{ github.event.inputs.video_url }}"     >> $GITHUB_ENV
            echo "VIDEO_TITLE=${{ github.event.inputs.video_title }}" >> $GITHUB_ENV
          else
            echo "VIDEO_ID=${{ github.event.client_payload.video_id }}"       >> $GITHUB_ENV
            echo "VIDEO_URL=${{ github.event.client_payload.video_url }}"     >> $GITHUB_ENV
            echo "VIDEO_TITLE=${{ github.event.client_payload.video_title }}" >> $GITHUB_ENV
          fi

      - name: Run Automation
        run: python main.py run
        env:
          VIDEO_PRIVACY: public

      - name: Save Database
        if: always()
        run: |
          git config user.name  "automation-bot"
          git config user.email "bot@github.com"
          git add database.json || true
          git diff --staged --quiet || git commit -m "Update DB"
          git push || true