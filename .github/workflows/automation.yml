name: Video Upload

on:
  repository_dispatch:
    types: [new_video_detected]
  workflow_dispatch:
    inputs:
      video_id:
        description: 'YouTube Video ID'
        required: true
        default: ''
      video_url:
        description: 'YouTube Video URL'
        required: true
        default: ''
      video_title:
        description: 'Video Title'
        required: false
        default: 'Relaxing Video'
      video_privacy:
        description: 'Privacy'
        required: false
        default: 'public'

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token:       ${{ secrets.GH_TOKEN }}
          clean:       true
          fetch-depth: 1
          ref:         main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg and Tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg wireguard-tools
          echo "✅ FFmpeg ready"

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -U yt-dlp
          echo "✅ yt-dlp: $(yt-dlp --version)"

      - name: Setup Cloudflare WARP VPN
        run: |
          echo "🌐 Setting up WARP VPN..."
          curl -fsSL \
            https://raw.githubusercontent.com/P3TERX/warp.sh/main/warp.sh \
            -o warp.sh
          sudo bash warp.sh 4
          echo "⏳ Waiting for VPN to stabilize..."
          sleep 10
          echo ""
          echo "✅ VPN Connected!"
          echo "🌍 Current IP:"
          curl -4 ifconfig.me || true
          echo ""
          echo "🌍 Location:"
          curl -s https://ipapi.co/json/ | python3 -c \
            "import sys,json; d=json.load(sys.stdin); \
            print(f'Country: {d[\"country_name\"]} | IP: {d[\"ip\"]}')" \
            || true

      - name: Restore Database
        uses: actions/cache@v4
        with:
          path: database.json
          key: db-v1
          restore-keys: db-v1

      - name: Create Credentials
        run: |
          echo '${{ secrets.CLIENT_SECRETS }}' > client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN }}'  > token.json
          printf '%s' '${{ secrets.COOKIES_TXT }}' > cookies.txt
          echo "✅ Credentials created"
          echo "📄 Cookies: $(wc -l < cookies.txt) lines"

      - name: Create Database If Missing
        run: |
          if [ ! -f database.json ]; then
            echo '{
              "uploaded_videos": [],
              "daily_counts": {},
              "statistics": {"total_uploads": 0},
              "queued": []
            }' > database.json
            echo "✅ database.json created"
          else
            echo "✅ database.json exists"
          fi

      - name: Set Variables
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VIDEO_ID="${{ github.event.inputs.video_id }}"
            VIDEO_URL="${{ github.event.inputs.video_url }}"
            VIDEO_TITLE="${{ github.event.inputs.video_title }}"
            VIDEO_PRIVACY="${{ github.event.inputs.video_privacy }}"
          else
            VIDEO_ID="${{ github.event.client_payload.video_id }}"
            VIDEO_URL="${{ github.event.client_payload.video_url }}"
            VIDEO_TITLE="${{ github.event.client_payload.video_title }}"
            VIDEO_PRIVACY="${{ github.event.client_payload.video_privacy }}"
          fi
          [ -z "$VIDEO_PRIVACY" ] && VIDEO_PRIVACY="public"
          [ -z "$VIDEO_TITLE"   ] && VIDEO_TITLE="Relaxing Video"
          echo "VIDEO_ID=$VIDEO_ID"           >> $GITHUB_ENV
          echo "VIDEO_URL=$VIDEO_URL"         >> $GITHUB_ENV
          echo "VIDEO_TITLE=$VIDEO_TITLE"     >> $GITHUB_ENV
          echo "VIDEO_PRIVACY=$VIDEO_PRIVACY" >> $GITHUB_ENV

      - name: Show Video Info
        run: |
          echo "============================================"
          echo "🎬 Video Information"
          echo "   ID     : ${{ env.VIDEO_ID }}"
          echo "   URL    : ${{ env.VIDEO_URL }}"
          echo "   Title  : ${{ env.VIDEO_TITLE }}"
          echo "   Privacy: ${{ env.VIDEO_PRIVACY }}"
          echo "============================================"

      - name: Test YouTube Access
        run: |
          echo "🧪 Testing YouTube access via WARP..."
          yt-dlp \
            --cookies cookies.txt \
            --extractor-args "youtube:player_client=android" \
            --skip-download \
            --print duration_string \
            "${{ env.VIDEO_URL }}" \
            && echo "✅ SUCCESS!" \
            || echo "⚠️ Test failed"

      - name: Run Automation
        run: python main.py run
        env:
          VIDEO_ID:           ${{ env.VIDEO_ID }}
          VIDEO_URL:          ${{ env.VIDEO_URL }}
          VIDEO_TITLE:        ${{ env.VIDEO_TITLE }}
          VIDEO_PRIVACY:      ${{ env.VIDEO_PRIVACY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Save Database
        if: always()
        run: |
          git config user.name  "automation-bot"
          git config user.email "bot@github.com"
          git add database.json || true
          git diff --staged --quiet || \
            git commit -m "Update DB [skip ci]"
          git push || true

      - name: Cleanup
        if: always()
        run: |
          rm -rf downloads/  || true
          rm -rf processed/  || true
          rm -rf thumbnails/ || true
          rm -f  cookies.txt || true
          rm -f  token.json  || true
          rm -f  client_secrets.json || true
          echo "✅ Cleanup done"
